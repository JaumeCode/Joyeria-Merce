<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <link rel="icon" href="/favicon.ico">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Joyería en Puerto de Sagunto | Joyería Mercè</title>
  <meta name="description" content="Joyería en Puerto de Sagunto (Valencia). Anillos, pulseras, cadenas y más.">
  <link rel="canonical" href="https://joyeriamerce.es">

  <!-- 1. PRECARGAS (ROMPE EL ÁRBOL DE DEPENDENCIA) -->
  <!-- Esto le dice al navegador: "Bájalo YA, no esperes a que el JS lo pida" -->
  <link rel="preload" href="/assets/app-CVr5fCQR.js" as="script">
  <link rel="preload" href="/assets/app-JjwvjJJM.css" as="style">
  <!-- Precarga la fuente principal (cambia el nombre si cambia en el build) -->
  <link rel="preload" href="/assets/nuFiD-vYS.woff2" as="font" type="font/woff2" crossorigin>

  <!-- 2. CARGA DE CSS (ESTRATEGIA ASÍNCRONA) -->
  <link rel="stylesheet" href="/assets/app-JjwvjJJM.css" media="print" onload="this.media='all'">

  <!-- 3. CRITICAL CSS -->
  <style>
    body { margin: 0; background: #F4F0E8; font-family: system-ui, -apple-system, sans-serif; }
    #app { min-height: 100vh; display: flex; flex-direction: column; }
    .loading-placeholder { height: 100vh; width: 100%; background: #F4F0E8; }
  </style>

  <!-- 4. OPTIMIZAR CONEXIONES EXTERNAS -->
  <link rel="preconnect" href="https://firebasestorage.googleapis.com" crossorigin>
  <link rel="preconnect" href="https://firestore.googleapis.com">
  <link rel="dns-prefetch" href="https://www.googletagmanager.com">

  <!-- Open Graph -->
  <meta property="og:type" content="website">
  <meta property="og:title" content="Joyería Mercè">
  <meta property="og:description" content="Joyería en Puerto de Sagunto (Valencia). Anillos, pulseras, cadenas y más.">
  <meta property="og:image" content="https://firebasestorage.googleapis.com/v0/b/joyeriamerce-runing.firebasestorage.app/o/assets%2FLogo%20Tienda.png?alt=media">

  <!-- GTM Optimizado (Carga solo cuando el navegador esté libre) -->
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){ dataLayer.push(arguments); }
    gtag('js', new Date());
    gtag('config', 'GTM-W8RB367C', { 'anonymize_ip': true });

    window.addEventListener('load', () => {
      // Usamos requestIdleCallback si está disponible para no molestar al renderizado
      const loadGTM = () => {
        const s = document.createElement('script');
        s.src = 'https://www.googletagmanager.com/gtag/js?id=GTM-W8RB367C';
        s.async = true;
        document.head.appendChild(s);
      };
      if ('requestIdleCallback' in window) {
        requestIdleCallback(loadGTM);
      } else {
        setTimeout(loadGTM, 3000);
      }
    });
  </script>
</head>
<body>
  <div id="app">
    <div class="loading-placeholder"></div>
  </div>
  
  <!-- 5. JS PRINCIPAL CON DEFER -->
  <script type="module" src="/src/main.js" defer></script>
</body>
</html>
