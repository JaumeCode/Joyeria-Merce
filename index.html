<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <link rel="icon" href="/favicon.ico">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  
  <!-- Optimización de recursos: dns-prefetch para terceros -->
  <link rel="dns-prefetch" href="https://www.googletagmanager.com">
  <link rel="dns-prefetch" href="https://firebasestorage.googleapis.com">

  <title>Joyería en Puerto de Sagunto | Joyería Mercè</title>
  <meta name="description" content="Joyería en Puerto de Sagunto (Valencia). Anillos, pulseras, cadenas y más.">
  <link rel="canonical" href="https://joyeriamerce.es">

  <!-- ⚡ CRITICAL CSS (inline para evitar bloqueo) -->
  <style>
    :root { --bg-color: #FDFCF8; }
    body {
      margin: 0;
      background: var(--bg-color);
      font-family: system-ui, -apple-system, sans-serif;
    }
    #app { min-height: 100vh; }
    .header_fixed {
      position: fixed;
      top: 0;
      width: 100%;
      height: 70px;
      background: white;
      z-index: 1000;
    }
  </style>

  <!-- 🔗 PRECONNECT (solo lo necesario) -->
  <link rel="preconnect" href="https://fonts.googleapis.com" crossorigin>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="preconnect" href="https://firebasestorage.googleapis.com" crossorigin>

  <!-- 🔤 GOOGLE FONTS (no bloquea render) -->
  <link rel="preload" as="style"
    href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600&family=Playfair+Display:wght@600&display=swap"
    onload="this.onload=null;this.rel='stylesheet'">

  <noscript>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600&family=Playfair+Display:wght@600&display=swap" rel="stylesheet">
  </noscript>

  <!-- 📦 CSS PRINCIPAL (no bloquea render - carga asincrónica con fallback) -->
  <link rel="preload" href="/assets/app.css" as="style" onload="this.onload=null;this.rel='stylesheet'">
  <noscript>
    <link rel="stylesheet" href="/assets/app.css">
  </noscript>

  <!-- 🧠 Optimización de recursos (DNS & Preconnect ya en head) -->

  <!-- Open Graph -->
  <meta property="og:type" content="website">
  <meta property="og:title" content="Joyería Mercè">
  <meta property="og:image" content="https://firebasestorage.googleapis.com/v0/b/joyeriamerce-runing.firebasestorage.app/o/assets%2FLogo%20Tienda.png?alt=media">

  <!-- ⚡ GOOGLE TAG MANAGER (carga optimizada sin bloqueo de render) -->
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments)}
    gtag('js', new Date());
    gtag('config', 'GTM-W8RB367C', { anonymize_ip: true });
    
    // Cargar script de GTM de forma asincrónica para no bloquear render
    const loadGTM = () => {
      const script = document.createElement('script');
      script.src = 'https://www.googletagmanager.com/gtag/js?id=GTM-W8RB367C';
      script.async = true;
      document.head.appendChild(script);
    };
    
    if (document.readyState === 'loading') {
      document.addEventListener('DOMContentLoaded', loadGTM);
    } else {
      loadGTM();
    }
  </script>

</head>

<body>
  <div id="app"></div>

  <!-- 🚀 JS PRINCIPAL (módulo Vue) -->
  <script type="module" src="/src/main.js"></script>
</body>
</html>
